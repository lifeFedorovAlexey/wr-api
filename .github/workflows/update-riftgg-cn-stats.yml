name: Update RiftGG CN stats

on:
  schedule:
    - cron: "20 3 * * *"
  workflow_dispatch:

jobs:
  update-riftgg-cn-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_PUBLIC_BASE_URL: ${{ secrets.S3_PUBLIC_BASE_URL }}
      S3_FORCE_PATH_STYLE: ${{ secrets.S3_FORCE_PATH_STYLE }}
      ASSET_PUBLIC_MODE: ${{ secrets.ASSET_PUBLIC_MODE }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      RIFTGG_IMPORT_CONCURRENCY: 4
      RIFTGG_REQUEST_TIMEOUT_MS: 20000
      RIFTGG_FETCH_RETRIES: 2

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Ensure RiftGG CN stats tables
        run: npm run setup:riftgg-cn-stats

      - name: Import RiftGG CN stats
        timeout-minutes: 40
        run: node scripts/import-riftgg-cn-stats.mjs
