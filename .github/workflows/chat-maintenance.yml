name: Chat Maintenance

on:
  schedule:
    - cron: "40 2 * * *"
  workflow_dispatch:

concurrency:
  group: chat-maintenance
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_POOL_MAX: 2
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_FORCE_PATH_STYLE: ${{ secrets.S3_FORCE_PATH_STYLE }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure chat schema is current
        run: npm run setup:chat

      - name: Ensure S3 chat retention rule
        continue-on-error: true
        run: npm run setup:chat-media-lifecycle

      - name: Remove chat content older than 90 days
        run: npm run cleanup:chat
