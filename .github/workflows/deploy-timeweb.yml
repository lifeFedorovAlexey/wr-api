name: Deploy API To Timeweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-api-timeweb
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.TIMEWEB_HOST }}
          username: ${{ secrets.TIMEWEB_USER }}
          password: ${{ secrets.TIMEWEB_PASSWORD }}
          debug: true
          script: |
            set -e
            cd /var/www/wr-api
            git fetch origin
            git checkout main
            git pull --ff-only origin main
            npm ci
            pm2 delete wr-api || true
            pm2 start npm --name wr-api --cwd /var/www/wr-api -- start
            pm2 save
