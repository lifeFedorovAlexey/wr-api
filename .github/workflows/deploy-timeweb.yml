name: Deploy API To Timeweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-api-timeweb
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      S3_PUBLIC_BASE_URL: ${{ vars.S3_PUBLIC_BASE_URL }}
      S3_FORCE_PATH_STYLE: ${{ vars.S3_FORCE_PATH_STYLE }}
      ASSET_PUBLIC_MODE: ${{ vars.ASSET_PUBLIC_MODE }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          S3_PUBLIC_BASE_URL: ${{ vars.S3_PUBLIC_BASE_URL }}
          S3_FORCE_PATH_STYLE: ${{ vars.S3_FORCE_PATH_STYLE }}
          ASSET_PUBLIC_MODE: ${{ vars.ASSET_PUBLIC_MODE }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
        with:
          host: ${{ secrets.TIMEWEB_HOST }}
          username: ${{ secrets.TIMEWEB_USER }}
          password: ${{ secrets.TIMEWEB_PASSWORD }}
          debug: true
          envs: S3_ENDPOINT,S3_BUCKET,S3_PUBLIC_BASE_URL,S3_FORCE_PATH_STYLE,ASSET_PUBLIC_MODE,S3_ACCESS_KEY_ID,S3_SECRET_ACCESS_KEY
          script: |
            set -e
            upsert_env() {
              key="$1"
              value="$2"
              file="$3"
              touch "$file"
              if grep -q "^${key}=" "$file"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$file"
              else
                printf '%s\n' "${key}=${value}" >> "$file"
              fi
            }
            cd /var/www/wr-api
            git stash push --include-untracked -m "deploy-api-$(date +%s)" || true
            git fetch origin
            git checkout main
            git pull --ff-only origin main
            upsert_env S3_ENDPOINT "${S3_ENDPOINT}" .env
            upsert_env S3_BUCKET "${S3_BUCKET}" .env
            upsert_env S3_ACCESS_KEY_ID "${S3_ACCESS_KEY_ID}" .env
            upsert_env S3_SECRET_ACCESS_KEY "${S3_SECRET_ACCESS_KEY}" .env
            upsert_env S3_PUBLIC_BASE_URL "${S3_PUBLIC_BASE_URL}" .env
            upsert_env S3_FORCE_PATH_STYLE "${S3_FORCE_PATH_STYLE}" .env
            upsert_env ASSET_PUBLIC_MODE "${ASSET_PUBLIC_MODE}" .env
            npm ci
            pm2 delete wr-api || true
            pm2 start npm --name wr-api --cwd /var/www/wr-api -- start
            pm2 save