name: Deploy API To Timeweb

on:
  workflow_call:
    secrets:
      ADMIN_SESSION_SECRET:
        required: false
      USER_SESSION_SECRET:
        required: false
      ADMIN_BOOTSTRAP_EMAILS:
        required: false
      ADMIN_BOOTSTRAP_TELEGRAM_IDS:
        required: false
      ADMIN_BOOTSTRAP_TELEGRAM_USERNAMES:
        required: false
      S3_ENDPOINT:
        required: false
      S3_BUCKET:
        required: false
      S3_ACCESS_KEY_ID:
        required: false
      S3_SECRET_ACCESS_KEY:
        required: false
      S3_PUBLIC_BASE_URL:
        required: false
      S3_FORCE_PATH_STYLE:
        required: false
      ASSET_PUBLIC_MODE:
        required: false
      DATABASE_URL:
        required: false
      GUIDES_SYNC_SECRET:
        required: false
      TIMEWEB_HOST:
        required: true
      TIMEWEB_USER:
        required: true
      TIMEWEB_PASSWORD:
        required: true

concurrency:
  group: deploy-api-timeweb
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
      USER_SESSION_SECRET: ${{ secrets.USER_SESSION_SECRET }}
      ADMIN_BOOTSTRAP_EMAILS: ${{ secrets.ADMIN_BOOTSTRAP_EMAILS }}
      ADMIN_BOOTSTRAP_TELEGRAM_IDS: ${{ secrets.ADMIN_BOOTSTRAP_TELEGRAM_IDS }}
      ADMIN_BOOTSTRAP_TELEGRAM_USERNAMES: ${{ secrets.ADMIN_BOOTSTRAP_TELEGRAM_USERNAMES }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_PUBLIC_BASE_URL: ${{ secrets.S3_PUBLIC_BASE_URL }}
      S3_FORCE_PATH_STYLE: ${{ secrets.S3_FORCE_PATH_STYLE }}
      ASSET_PUBLIC_MODE: ${{ secrets.ASSET_PUBLIC_MODE }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GUIDES_SYNC_SECRET: ${{ secrets.GUIDES_SYNC_SECRET }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          USER_SESSION_SECRET: ${{ secrets.USER_SESSION_SECRET }}
          ADMIN_BOOTSTRAP_EMAILS: ${{ secrets.ADMIN_BOOTSTRAP_EMAILS }}
          ADMIN_BOOTSTRAP_TELEGRAM_IDS: ${{ secrets.ADMIN_BOOTSTRAP_TELEGRAM_IDS }}
          ADMIN_BOOTSTRAP_TELEGRAM_USERNAMES: ${{ secrets.ADMIN_BOOTSTRAP_TELEGRAM_USERNAMES }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_PUBLIC_BASE_URL: ${{ secrets.S3_PUBLIC_BASE_URL }}
          S3_FORCE_PATH_STYLE: ${{ secrets.S3_FORCE_PATH_STYLE }}
          ASSET_PUBLIC_MODE: ${{ secrets.ASSET_PUBLIC_MODE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GUIDES_SYNC_SECRET: ${{ secrets.GUIDES_SYNC_SECRET }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
        with:
          host: ${{ secrets.TIMEWEB_HOST }}
          username: ${{ secrets.TIMEWEB_USER }}
          password: ${{ secrets.TIMEWEB_PASSWORD }}
          envs: ADMIN_SESSION_SECRET,USER_SESSION_SECRET,ADMIN_BOOTSTRAP_EMAILS,ADMIN_BOOTSTRAP_TELEGRAM_IDS,ADMIN_BOOTSTRAP_TELEGRAM_USERNAMES,S3_ENDPOINT,S3_BUCKET,S3_PUBLIC_BASE_URL,S3_FORCE_PATH_STYLE,ASSET_PUBLIC_MODE,DATABASE_URL,GUIDES_SYNC_SECRET,S3_ACCESS_KEY_ID,S3_SECRET_ACCESS_KEY
          script: |
            set -e
            APP_ROOT="/var/www/wr-api"
            RELEASES_DIR="${APP_ROOT}/releases"
            SHARED_DIR="${APP_ROOT}/shared"
            CURRENT_LINK="${APP_ROOT}/current"
            REPO_DIR="${APP_ROOT}/repo"
            RELEASE_ID="$(date +%Y%m%d%H%M%S)"
            RELEASE_DIR="${RELEASES_DIR}/${RELEASE_ID}"
            PUBLIC_CANARY_NAME="wr-api-public-canary-${RELEASE_ID}"
            AUTH_CANARY_NAME="wr-api-auth-canary-${RELEASE_ID}"
            GATEWAY_CANARY_NAME="wr-api-gateway-canary-${RELEASE_ID}"
            PUBLIC_PM2_APP_NAME="wr-api-public"
            AUTH_PM2_APP_NAME="wr-api-auth"
            GATEWAY_PM2_APP_NAME="wr-api"
            GATEWAY_APP_PORT="3001"
            PUBLIC_APP_PORT="3002"
            AUTH_APP_PORT="3003"
            GATEWAY_CANARY_PORT="3101"
            PUBLIC_CANARY_PORT="3102"
            AUTH_CANARY_PORT="3103"
            PREVIOUS_TARGET=""

            upsert_env() {
              key="$1"
              value="$2"
              file="$3"
              touch "$file"
              if grep -q "^${key}=" "$file"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$file"
              else
                printf '%s\n' "${key}=${value}" >> "$file"
              fi
            }

            wait_for_health() {
              port="$1"
              attempts="${2:-60}"
              i=1
              while [ "$i" -le "$attempts" ]; do
                if curl -fsS "http://127.0.0.1:${port}/api/health" >/dev/null 2>&1; then
                  printf '[deploy-api] health ok on %s (attempt %s/%s)\n' "${port}" "${i}" "${attempts}"
                  return 0
                fi
                printf '[deploy-api] waiting for health on %s (attempt %s/%s)\n' "${port}" "${i}" "${attempts}"
                sleep 2
                i=$((i + 1))
              done
              return 1
            }

            cleanup_canaries() {
              pm2 delete "${PUBLIC_CANARY_NAME}" >/dev/null 2>&1 || true
              pm2 delete "${AUTH_CANARY_NAME}" >/dev/null 2>&1 || true
              pm2 delete "${GATEWAY_CANARY_NAME}" >/dev/null 2>&1 || true
            }

            restart_live_apps() {
              pm2 delete "${GATEWAY_PM2_APP_NAME}" >/dev/null 2>&1 || true
              pm2 delete "${PUBLIC_PM2_APP_NAME}" >/dev/null 2>&1 || true
              pm2 delete "${AUTH_PM2_APP_NAME}" >/dev/null 2>&1 || true
              pm2 start "${SHARED_DIR}/ecosystem.config.cjs" --update-env
            }

            log_step() {
              printf '\n[deploy-api] %s\n' "$1"
            }

            log_step "prepare directories"
            mkdir -p "${RELEASES_DIR}" "${SHARED_DIR}" "${REPO_DIR}"
            cd "${REPO_DIR}"
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/lifeFedorovAlexey/wr-api.git
              git fetch origin
              git checkout -b main origin/main
            fi

            log_step "update repo"
            git stash push --include-untracked -m "deploy-api-${RELEASE_ID}" || true
            git fetch origin
            git checkout main
            git pull --ff-only origin main

            log_step "create release ${RELEASE_ID}"
            mkdir -p "${RELEASE_DIR}"
            git archive --format=tar HEAD | tar -xf - -C "${RELEASE_DIR}"

            upsert_env ADMIN_SESSION_SECRET "${ADMIN_SESSION_SECRET}" "${RELEASE_DIR}/.env"
            upsert_env USER_SESSION_SECRET "${USER_SESSION_SECRET}" "${RELEASE_DIR}/.env"
            upsert_env ADMIN_BOOTSTRAP_EMAILS "${ADMIN_BOOTSTRAP_EMAILS}" "${RELEASE_DIR}/.env"
            upsert_env ADMIN_BOOTSTRAP_TELEGRAM_IDS "${ADMIN_BOOTSTRAP_TELEGRAM_IDS}" "${RELEASE_DIR}/.env"
            upsert_env ADMIN_BOOTSTRAP_TELEGRAM_USERNAMES "${ADMIN_BOOTSTRAP_TELEGRAM_USERNAMES}" "${RELEASE_DIR}/.env"
            upsert_env S3_ENDPOINT "${S3_ENDPOINT}" "${RELEASE_DIR}/.env"
            upsert_env S3_BUCKET "${S3_BUCKET}" "${RELEASE_DIR}/.env"
            upsert_env S3_ACCESS_KEY_ID "${S3_ACCESS_KEY_ID}" "${RELEASE_DIR}/.env"
            upsert_env S3_SECRET_ACCESS_KEY "${S3_SECRET_ACCESS_KEY}" "${RELEASE_DIR}/.env"
            upsert_env S3_PUBLIC_BASE_URL "${S3_PUBLIC_BASE_URL}" "${RELEASE_DIR}/.env"
            upsert_env S3_FORCE_PATH_STYLE "${S3_FORCE_PATH_STYLE}" "${RELEASE_DIR}/.env"
            upsert_env ASSET_PUBLIC_MODE "${ASSET_PUBLIC_MODE}" "${RELEASE_DIR}/.env"
            upsert_env DATABASE_URL "${DATABASE_URL}" "${RELEASE_DIR}/.env"
            upsert_env GUIDES_SYNC_SECRET "${GUIDES_SYNC_SECRET}" "${RELEASE_DIR}/.env"

            log_step "install dependencies and setup schema"
            cd "${RELEASE_DIR}"
            npm ci
            npm run setup:stats
            npm run setup:guides
            npm run setup:admin
            npm run setup:chat
            npm run setup:riftgg-cn-stats
            npm run setup:news

            log_step "start canary public/auth/gateway"
            cleanup_canaries
            PORT="${PUBLIC_CANARY_PORT}" HOST="127.0.0.1" pm2 start "${RELEASE_DIR}/server-public.mjs" --interpreter node --name "${PUBLIC_CANARY_NAME}" --cwd "${RELEASE_DIR}"
            PORT="${AUTH_CANARY_PORT}" HOST="127.0.0.1" pm2 start "${RELEASE_DIR}/server-auth.mjs" --interpreter node --name "${AUTH_CANARY_NAME}" --cwd "${RELEASE_DIR}"
            PORT="${GATEWAY_CANARY_PORT}" HOST="127.0.0.1" PUBLIC_UPSTREAM_PORT="${PUBLIC_CANARY_PORT}" AUTH_UPSTREAM_PORT="${AUTH_CANARY_PORT}" pm2 start "${RELEASE_DIR}/server-gateway.mjs" --interpreter node --name "${GATEWAY_CANARY_NAME}" --cwd "${RELEASE_DIR}"
            if ! wait_for_health "${PUBLIC_CANARY_PORT}" 60; then
              pm2 logs "${PUBLIC_CANARY_NAME}" --lines 120 --nostream || true
              cleanup_canaries
              echo "public canary failed health-check"
              exit 1
            fi
            if ! wait_for_health "${AUTH_CANARY_PORT}" 60; then
              pm2 logs "${AUTH_CANARY_NAME}" --lines 120 --nostream || true
              cleanup_canaries
              echo "auth canary failed health-check"
              exit 1
            fi
            if ! wait_for_health "${GATEWAY_CANARY_PORT}" 60; then
              pm2 logs "${GATEWAY_CANARY_NAME}" --lines 120 --nostream || true
              cleanup_canaries
              echo "gateway canary failed health-check"
              exit 1
            fi
            cleanup_canaries

            cat > "${SHARED_DIR}/ecosystem.config.cjs" <<EOF
            module.exports = {
              apps: [
                {
                  name: "${PUBLIC_PM2_APP_NAME}",
                  script: "./server-public.mjs",
                  cwd: "${CURRENT_LINK}",
                  interpreter: "node",
                  instances: 1,
                  exec_mode: "fork",
                  listen_timeout: 10000,
                  kill_timeout: 10000,
                  env: {
                    PORT: "${PUBLIC_APP_PORT}",
                    HOST: "127.0.0.1"
                  }
                },
                {
                  name: "${AUTH_PM2_APP_NAME}",
                  script: "./server-auth.mjs",
                  cwd: "${CURRENT_LINK}",
                  interpreter: "node",
                  instances: 1,
                  exec_mode: "fork",
                  listen_timeout: 10000,
                  kill_timeout: 10000,
                  env: {
                    PORT: "${AUTH_APP_PORT}",
                    HOST: "127.0.0.1"
                  }
                },
                {
                  name: "${GATEWAY_PM2_APP_NAME}",
                  script: "./server-gateway.mjs",
                  cwd: "${CURRENT_LINK}",
                  interpreter: "node",
                  instances: 1,
                  exec_mode: "fork",
                  listen_timeout: 10000,
                  kill_timeout: 10000,
                  env: {
                    PORT: "${GATEWAY_APP_PORT}",
                    HOST: "127.0.0.1",
                    PUBLIC_UPSTREAM_PORT: "${PUBLIC_APP_PORT}",
                    AUTH_UPSTREAM_PORT: "${AUTH_APP_PORT}"
                  }
                }
              ]
            };
            EOF

            if [ -L "${CURRENT_LINK}" ]; then
              PREVIOUS_TARGET="$(readlink -f "${CURRENT_LINK}")"
            fi
            log_step "switch current symlink"
            ln -sfn "${RELEASE_DIR}" "${CURRENT_LINK}"

            log_step "replace live pm2 processes"
            restart_live_apps

            log_step "wait for production health on ${PUBLIC_APP_PORT}, ${AUTH_APP_PORT}, ${GATEWAY_APP_PORT}"
            if ! wait_for_health "${PUBLIC_APP_PORT}" 60; then
              pm2 logs "${PUBLIC_PM2_APP_NAME}" --lines 120 --nostream || true
              if [ -n "${PREVIOUS_TARGET}" ] && [ -d "${PREVIOUS_TARGET}" ]; then
                log_step "rollback to previous release"
                ln -sfn "${PREVIOUS_TARGET}" "${CURRENT_LINK}"
                restart_live_apps || true
              fi
              echo "public failed health-check after reload"
              exit 1
            fi
            if ! wait_for_health "${AUTH_APP_PORT}" 60; then
              pm2 logs "${AUTH_PM2_APP_NAME}" --lines 120 --nostream || true
              if [ -n "${PREVIOUS_TARGET}" ] && [ -d "${PREVIOUS_TARGET}" ]; then
                log_step "rollback to previous release"
                ln -sfn "${PREVIOUS_TARGET}" "${CURRENT_LINK}"
                restart_live_apps || true
              fi
              echo "auth failed health-check after reload"
              exit 1
            fi
            if ! wait_for_health "${GATEWAY_APP_PORT}" 60; then
              pm2 logs "${GATEWAY_PM2_APP_NAME}" --lines 120 --nostream || true
              if [ -n "${PREVIOUS_TARGET}" ] && [ -d "${PREVIOUS_TARGET}" ]; then
                log_step "rollback to previous release"
                ln -sfn "${PREVIOUS_TARGET}" "${CURRENT_LINK}"
                restart_live_apps || true
              fi
              echo "gateway failed health-check after reload"
              exit 1
            fi

            log_step "cleanup old releases"
            ls -1dt "${RELEASES_DIR}"/* 2>/dev/null | tail -n +6 | xargs -r rm -rf
            pm2 save
