name: Deploy API To Timeweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-api-timeweb
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_PUBLIC_BASE_URL: ${{ secrets.S3_PUBLIC_BASE_URL }}
      S3_FORCE_PATH_STYLE: ${{ secrets.S3_FORCE_PATH_STYLE }}
      ASSET_PUBLIC_MODE: ${{ secrets.ASSET_PUBLIC_MODE }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GUIDES_SYNC_SECRET: ${{ secrets.GUIDES_SYNC_SECRET }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_PUBLIC_BASE_URL: ${{ secrets.S3_PUBLIC_BASE_URL }}
          S3_FORCE_PATH_STYLE: ${{ secrets.S3_FORCE_PATH_STYLE }}
          ASSET_PUBLIC_MODE: ${{ secrets.ASSET_PUBLIC_MODE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GUIDES_SYNC_SECRET: ${{ secrets.GUIDES_SYNC_SECRET }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
        with:
          host: ${{ secrets.TIMEWEB_HOST }}
          username: ${{ secrets.TIMEWEB_USER }}
          password: ${{ secrets.TIMEWEB_PASSWORD }}
          envs: S3_ENDPOINT,S3_BUCKET,S3_PUBLIC_BASE_URL,S3_FORCE_PATH_STYLE,ASSET_PUBLIC_MODE,DATABASE_URL,GUIDES_SYNC_SECRET,S3_ACCESS_KEY_ID,S3_SECRET_ACCESS_KEY
          script: |
            set -e
            APP_ROOT="/var/www/wr-api"
            RELEASES_DIR="${APP_ROOT}/releases"
            SHARED_DIR="${APP_ROOT}/shared"
            CURRENT_LINK="${APP_ROOT}/current"
            REPO_DIR="${APP_ROOT}/repo"
            RELEASE_ID="$(date +%Y%m%d%H%M%S)"
            RELEASE_DIR="${RELEASES_DIR}/${RELEASE_ID}"
            CANARY_NAME="wr-api-canary-${RELEASE_ID}"
            PM2_APP_NAME="wr-api"
            APP_PORT="3001"
            CANARY_PORT="3101"
            PREVIOUS_TARGET=""

            upsert_env() {
              key="$1"
              value="$2"
              file="$3"
              touch "$file"
              if grep -q "^${key}=" "$file"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$file"
              else
                printf '%s\n' "${key}=${value}" >> "$file"
              fi
            }

            wait_for_health() {
              port="$1"
              attempts="${2:-60}"
              i=1
              while [ "$i" -le "$attempts" ]; do
                if curl -fsS "http://127.0.0.1:${port}/api/health" >/dev/null 2>&1; then
                  printf '[deploy-api] health ok on %s (attempt %s/%s)\n' "${port}" "${i}" "${attempts}"
                  return 0
                fi
                printf '[deploy-api] waiting for health on %s (attempt %s/%s)\n' "${port}" "${i}" "${attempts}"
                sleep 2
                i=$((i + 1))
              done
              return 1
            }

            cleanup_canary() {
              pm2 delete "${CANARY_NAME}" >/dev/null 2>&1 || true
            }

            log_step() {
              printf '\n[deploy-api] %s\n' "$1"
            }

            log_step "prepare directories"
            mkdir -p "${RELEASES_DIR}" "${SHARED_DIR}" "${REPO_DIR}"
            cd "${REPO_DIR}"
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/lifeFedorovAlexey/wr-api.git
              git fetch origin
              git checkout -b main origin/main
            fi

            log_step "update repo"
            git stash push --include-untracked -m "deploy-api-${RELEASE_ID}" || true
            git fetch origin
            git checkout main
            git pull --ff-only origin main

            log_step "create release ${RELEASE_ID}"
            mkdir -p "${RELEASE_DIR}"
            git archive --format=tar HEAD | tar -xf - -C "${RELEASE_DIR}"

            upsert_env S3_ENDPOINT "${S3_ENDPOINT}" "${RELEASE_DIR}/.env"
            upsert_env S3_BUCKET "${S3_BUCKET}" "${RELEASE_DIR}/.env"
            upsert_env S3_ACCESS_KEY_ID "${S3_ACCESS_KEY_ID}" "${RELEASE_DIR}/.env"
            upsert_env S3_SECRET_ACCESS_KEY "${S3_SECRET_ACCESS_KEY}" "${RELEASE_DIR}/.env"
            upsert_env S3_PUBLIC_BASE_URL "${S3_PUBLIC_BASE_URL}" "${RELEASE_DIR}/.env"
            upsert_env S3_FORCE_PATH_STYLE "${S3_FORCE_PATH_STYLE}" "${RELEASE_DIR}/.env"
            upsert_env ASSET_PUBLIC_MODE "${ASSET_PUBLIC_MODE}" "${RELEASE_DIR}/.env"
            upsert_env DATABASE_URL "${DATABASE_URL}" "${RELEASE_DIR}/.env"
            upsert_env GUIDES_SYNC_SECRET "${GUIDES_SYNC_SECRET}" "${RELEASE_DIR}/.env"

            log_step "install dependencies and setup schema"
            cd "${RELEASE_DIR}"
            npm ci
            npm run setup:stats
            npm run setup:guides
            npm run setup:riftgg-cn-stats
            npm run setup:skins
            npm run setup:news

            log_step "start canary on ${CANARY_PORT}"
            cleanup_canary
            PORT="${CANARY_PORT}" HOST="127.0.0.1" pm2 start npm --name "${CANARY_NAME}" --cwd "${RELEASE_DIR}" -- start
            if ! wait_for_health "${CANARY_PORT}" 60; then
              pm2 logs "${CANARY_NAME}" --lines 120 --nostream || true
              cleanup_canary
              echo "canary failed health-check"
              exit 1
            fi
            cleanup_canary

            cat > "${SHARED_DIR}/ecosystem.config.cjs" <<EOF
            module.exports = {
              apps: [
                {
                  name: "${PM2_APP_NAME}",
                  script: "./server.mjs",
                  cwd: "${CURRENT_LINK}",
                  interpreter: "node",
                  instances: 1,
                  exec_mode: "fork",
                  listen_timeout: 10000,
                  kill_timeout: 10000,
                  env: {
                    PORT: "${APP_PORT}",
                    HOST: "127.0.0.1"
                  }
                }
              ]
            };
            EOF

            if [ -L "${CURRENT_LINK}" ]; then
              PREVIOUS_TARGET="$(readlink -f "${CURRENT_LINK}")"
            fi
            log_step "switch current symlink"
            ln -sfn "${RELEASE_DIR}" "${CURRENT_LINK}"

            log_step "replace live pm2 process"
            pm2 delete "${PM2_APP_NAME}" >/dev/null 2>&1 || true
            pm2 start "${SHARED_DIR}/ecosystem.config.cjs" --only "${PM2_APP_NAME}" --update-env
            pm2 delete "${CANARY_NAME}" >/dev/null 2>&1 || true

            log_step "wait for production health on ${APP_PORT}"
            if ! wait_for_health "${APP_PORT}" 60; then
              pm2 logs "${PM2_APP_NAME}" --lines 120 --nostream || true
              if [ -n "${PREVIOUS_TARGET}" ] && [ -d "${PREVIOUS_TARGET}" ]; then
                log_step "rollback to previous release"
                ln -sfn "${PREVIOUS_TARGET}" "${CURRENT_LINK}"
                pm2 delete "${PM2_APP_NAME}" >/dev/null 2>&1 || true
                pm2 start "${SHARED_DIR}/ecosystem.config.cjs" --only "${PM2_APP_NAME}" --update-env || true
              fi
              echo "production failed health-check after reload"
              exit 1
            fi

            log_step "cleanup old releases"
            ls -1dt "${RELEASES_DIR}"/* 2>/dev/null | tail -n +6 | xargs -r rm -rf
            pm2 save
